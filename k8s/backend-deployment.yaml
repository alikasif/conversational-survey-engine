apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cse
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: cse
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: cse
    spec:
      containers:
        - name: backend
          image: cse-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: cse-config
            - secretRef:
                name: cse-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
