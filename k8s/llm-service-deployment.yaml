apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  namespace: cse
  labels:
    app.kubernetes.io/name: llm-service
    app.kubernetes.io/part-of: cse
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-service
        app.kubernetes.io/part-of: cse
    spec:
      containers:
        - name: llm-service
          image: cse-llm-service:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: cse-config
            - secretRef:
                name: cse-secrets
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /app/credentials/service-account.json
          volumeMounts:
            - name: gcp-credentials
              mountPath: /app/credentials
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: gcp-credentials
          secret:
            secretName: cse-secrets
            items:
              - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
                path: service-account.json
