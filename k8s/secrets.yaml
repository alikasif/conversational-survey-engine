# WARNING: Replace placeholder values with real base64-encoded secrets before applying
# echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: cse-secrets
  namespace: cse
  labels:
    app.kubernetes.io/part-of: cse
type: Opaque
data:
  DATABASE_URL: REPLACE_WITH_BASE64_ENCODED_DATABASE_URL
  GEMINI_API_KEY: REPLACE_WITH_BASE64_ENCODED_GEMINI_API_KEY
  GOOGLE_APPLICATION_CREDENTIALS_JSON: REPLACE_WITH_BASE64_ENCODED_SERVICE_ACCOUNT_JSON
